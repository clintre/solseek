MSG_PNL_SEARCH_TITLE="Пошук / Список"
MSG_PNL_SEARCH_BODY="- Пошук
- Встановити
- Керувати
- Інформація

Пакет/Flatpak
- Необроблений список із системи або Flatpak
- Обмежені можливості пошуку
- Містить програми командного рядка. Приклад: fzf
- Не відсортовані

Десктопні програми
- Взяті з каталогу upstream
- Розширені можливості пошуку
- Немає програм командного рядка
- Відсортовані
"

