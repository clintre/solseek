MSG_HELP="Використання: solseek


Загальні параметри:
 -cc                          : очистити весь кеш
 --debug                      : показати налагоджувальну інформацію для solseek та вийти
 --version                    : показати номер версії програми та вийти
 -h (--help)                  : показати це довідкове повідомлення та вийти

Розширена команда оновлення (up)
    За замовчуванням: Оновлення eopkg та flatpak
    Використання: solseek up <опції>

    Опції:
     -e    - -e - Оновлює все, включаючи snap, прошивку, дистрибутив, кастомні оновлення, якщо увімкнено

Команда розширеного пошуку (sr)
    За замовчуванням: Пошук лише в eopkg
    Використання: solseek sr <опції> (аргументи)

    Опції:
     -f    - Шукати лише пакети flatpaks
     -a    - Шукати пакети flatpaks та eopkg
"

