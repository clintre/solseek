MSG_PNL_DRIVERS_TITLE="Менеджер драйверів"
MSG_PNL_DRIVERS_BODY="Встановлення та керування поширеними драйверами
- Nvidia (якщо наявний)
- Принтери та сканери
- Інші пристрої"

MSG_PNL_NVIDIA_TITLE="Менеджер драйверів Nvidia"
MSG_PNL_NVIDIA_BODY="Параметри залежать від встановленої відеокарти

Для відеокарт Nvidia 16-ї серії та новіших рекомендується відкритий драйвер.
Старіші відеокарти Nvidia будуть обмежені старішими пропрієтарними драйверами.
Якщо ви використовуєте Steam або граєте в певні ігри, встановлюйте з 32-бітною опцією.

Виконайте перезавантаження після встановлення або перевстановлення!"

MSG_PNL_TOOL_TITLE="Інструменти"
MSG_PNL_TOOL_BODY="- Перегляд/Експорт (історія, встановлено, налаштування, inxi)
- Пакетні інструменти (перевірка, очистка, відновлення)
- Solseek Config"

