MSG_HELP="Użycie: solseek

Alternatywne użycie jako opakowanie eopkg: solseek [komendy i opcje eopkg]
Aby zobaczyć komendy solseek i eopkg:
    użycie: solseek help

Rozszerzona komenda aktualizacji/up
Aby zaktualizować eopkg i flatpak
    użycie: solseek up

Aby zaktualizować wszystko
   użycie: solseek up -e

Opcje ogólne:
 --debug                      : pokaż informacje debugowania dla solseek i wyjdź
 --version                    : pokaż numer wersji programu i wyjdź
 -h [--help]                  : pokaż ten komunikat pomocy i wyjdź"
