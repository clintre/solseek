MSG_PNL_SEARCH_TITLE="Wyszukiwanie / Lista"
MSG_PNL_SEARCH_BODY="- Wyszukiwanie
- Instalacja
- Zarządzanie
- Informacje

Pakiet/Flatpak
- Surowa lista pobrana z eopkg lub flatpak
- Ograniczone możliwości wyszukiwania
- Zawiera aplikacje z wierszem poleceń. Przykład: fzf
- Niepodzielone na kategorie

Aplikacje desktopowe
- Pobrane z katalogu appstream
- Rozszerzone możliwości wyszukiwania
