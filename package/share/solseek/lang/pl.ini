MSG_PNL_RB_TITLE="EOPKG Wycofanie zmian"
MSG_PNL_RB_BODY="Dostęp do Menu EOPKG Historia Wycofania Zmian"
MSG_PNL_RB_HELP="Wybierz numer operacji mniejszy od numeru aktualizacji, którą chcesz anulować z lewego menu.
Przykład: Jeśli chcesz anulować operację 100, użyj numeru 99.
Będziesz miał opcję potwierdzenia."

