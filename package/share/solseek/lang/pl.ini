MSG_PNL_DRIVERS_TITLE="Menedżer sterowników"
MSG_PNL_DRIVERS_BODY="Instaluj i zarządzaj popularnymi sterownikami
- Nvidia (jeśli dostępna)
- Drukarki i skanery"

MSG_PNL_NVIDIA_TITLE="Nvidia Menedżer sterowników"
MSG_PNL_NVIDIA_BODY="Opcje zależą od zainstalowanego układu GPU

Dla GPU Nvidia z serii 16 lub nowszych zalecany jest otwarty sterownik.
Starsze układy GPU Nvidia będą ograniczone do starszych sterowników własnościowych.
Jeśli używasz Steam lub grasz w wybrane gry, zainstaluj z opcją 32-bitową.

Uruchom ponownie po instalacji/odinstalowaniu!"

