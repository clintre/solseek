MSG_PNL_NVIDIA_TITLE="Gerenciador de Driver da Nvidia"
MSG_PNL_NVIDIA_BODY="As opções são baseadas na GPU instalada

Para GPUs Nvidia da série 16xx ou posterior, recomenda-se o driver de código aberto.
GPUs Nvidia mais antigas estarão limitadas a drivers proprietários mais antigos.
Se você usa o Steam ou joga determinados jogos, instale com a opção de 32 bits.

Reiniciar após instalar/desinstalar!"

