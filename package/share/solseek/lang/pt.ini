MSG_HELP="Uso: solseek

Uso alternativo do wrapper eopkg: solseek [eopkg comando e opções]
Para ver os comandos do solseek e do eopkg:
    use: solseek help

Comando de update/up aprimorado
Para atualizar eopkg e flatpak
    use: solseek up

Para atualizar tudo
    use: solseek up -e

Opções Gerais:
 --debug                      : exibe informações de depuração para solseek
 --version                    : exibe o número da versão dos programas
 -h [--help]                  : exibe essa mensagem de ajuda"

