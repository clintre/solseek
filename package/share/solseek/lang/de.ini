MSG_PNL_NVIDIA_TITLE="Nvidia Treiberverwaltung"
MSG_PNL_NVIDIA_BODY="Optionen sind von verwendeter Grafikkarte abhängig

Für die Nvidia GPU 16-Serie aufwärts wird der quelloffene Treiber empfohlen.
Ältere Nvidia-GPUs sind auf ältere, proprietäre Treiber angewiesen.
Wenn du Steam nutzt oder bestimmte Spiele spielst, installiere mit 32bit-Option.

Neustart nach Installation/Deinstallation erforderlich!"

