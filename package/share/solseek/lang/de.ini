MSG_HELP="Verwendung: solseek

Alternative Verwendung als eopkg-Wrapper: solseek [eopkg commands and options]
Um sowohl solseek- als auch eopkg-Befehle zu sehen:
    Verwendung: solseek help

Verbesserter update/up-Befehl
Um eopkg und flatpak zu aktualisieren
    Verwendung: solseek up

Um alles zu aktualisieren
    Verwendung: solseek up -e

Allgemeine Optionen:
 --debug                      : Debug-Informationen für solseek anzeigen und das Programm beenden
 --version                    : Versionsnummer der Software anzeigen und das Programm beenden
 -h [--help]                  : Diese Hilfe anzeigen und das Programm beenden"

