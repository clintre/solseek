MSG_PNL_RB_TITLE="Rollback"
MSG_PNL_RB_BODY="Chronik-Rollback-Menü aufrufen"
MSG_PNL_RB_HELP="Wähle Operation # mit einer Zahl, die kleiner als die Nummerierung jener Updates vom linken Menü ist, welche du rückgängig machen möchtest.
Beispiel: Wenn du Operation 100 rückgängig machen möchtest, wähle die Nummer 99.
Du wirst die Möglichkeit zur Bestätigung bekommen."

