MSG_HELP="Uporaba: solseek

Splošne možnosti:
 -cc                          : počisti ves predpomnilnik
 --debug                      : prikaže informacije o odpravljanju napak za solseek in konča
 --version                    : prikaže številko različice programa in konča
 -h (--help)                  : prikaže to sporočilo s pomočjo in konča

Izboljšan ukaz za posodobitev (up)
    Privzeto: Posodobi eopkg in flatpak
    Uporaba: solseek up <možnosti>

    Možnosti:
     -e    - Posodobi vse, vključno s snap, firmware, distrobox, custom, če je omogočeno

Izboljšan ukaz za iskanje (sr)
    Privzeto: Išče samo eopkg
    Uporaba: solseek sr <možnosti> (argumenti)

    Možnosti:
     -f    - Išče samo flatpake
     -a    - Išče flatpake in eopkg
 "
