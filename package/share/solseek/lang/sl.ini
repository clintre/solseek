MSG_PNL_RB_TITLE="Razveljavitev EOPKG"
MSG_PNL_RB_BODY="Dostop do menija za razveljavitev zgodovine EOPKG"
MSG_PNL_RB_HELP="Izberite operacijo # s številko, ki je nižja od posodobitve/posodobitev, ki jih želite razveljaviti iz levega menija.
Primer: Če želite razveljaviti operacijo 100, uporabite 99 kot številko.
Imeli boste možnost potrditve."

