MSG_PNL_NVIDIA_TITLE="Nvidia Upravitelj gonilnikov"
MSG_PNL_NVIDIA_BODY="Možnosti so odvisne od nameščenega GPU

Za Nvidia GPU serije 16 ali novejše je priporočen odprti gonilnik.
Starejši Nvidia GPU-ji bodo omejeni na starejše lastniške gonilnike.
Če uporabljate Steam ali igrate določene igre, namestite z 32-bitno možnostjo.

Ponovno zaženite po namestitvi/odstranitvi!"

