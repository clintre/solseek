MSG_PNL_NVIDIA_TITLE="Nvidia Gestionnaire de pilotes"
MSG_PNL_NVIDIA_BODY="Les options dépendent du GPU installé

Pour les GPU Nvidia série 16 ou ultérieure, le pilote ouvert est recommandé.
Les anciens GPU Nvidia seront limités aux anciens pilotes propriétaires.
Si vous utilisez Steam ou jouez à certains jeux, installez avec l'option 32 bits.

Redémarrez après l'installation/désinstallation !"

