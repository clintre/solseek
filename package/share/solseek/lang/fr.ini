MSG_HELP="Utilisation : solseek

Options générales :
 -cc                          : efface tout le cache
 --debug                      : affiche les informations de débogage pour solseek et quitte
 --version                    : affiche le numéro de version du programme et quitte
 -h (--help)                  : affiche ce message d'aide et quitte

Commande de mise à jour (up) améliorée
    Par défaut : Met à jour eopkg et flatpak
    Utilisation : solseek up <options>

    Options :
     -e    - Met tout à jour, y compris snap, firmware, distrobox, custom si activé

Commande de recherche (sr) améliorée
    Par défaut : Recherche eopkg uniquement
    Utilisation : solseek sr <options> (arguments)

    Options :
     -f    - Recherche des flatpaks uniquement
     -a    - Recherche des flatpaks et eopkg
 "

