MSG_PNL_NVIDIA_TITLE="Nvidia Gestor de controladores"
MSG_PNL_NVIDIA_BODY="Las opciones se basan en la GPU instalada

En GPU Nvidia serie 16 o superior se recomienda el controlador abierto.
Las GPU Nvidia antiguas estarán limitadas a controladores propietarios antiguos.
Si usas Steam o juegas a ciertos juegos, instala con la opción de 32 bits.

¡Reinicia después de instalar/desinstalar!"

