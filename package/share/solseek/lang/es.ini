MSG_HELP="Uso: solseek

Uso alterno como envoltorio eopkg: solseek [commandos eopkg y opciones]
Para ver comandos de solseek y eopkg:
    uso: help solseek

Comando update/up mejorado
Para actualizar eopkg y flatpak
    uso: solseek up

Para actualizar todo
    uso: solseek up -e

Opciones Generales:
 --debug                      : muestra la información debug para solseek y salir
 --version                    : muestra la versión del programa y salir
 -h [--help]                  : muestra este mensaje de ayuda y salir"

