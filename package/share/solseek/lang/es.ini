MSG_PNL_RB_TITLE="Rollback de EOPKG"
MSG_PNL_RB_BODY="Acceder al Menu de Historial Rollback de EOPKG"
MSG_PNL_RB_HELP="Selecciona el # de operación con un número menor al de la(s) actualizacione(s) que deseas deshacer del menú de la izquierda.
Ejemplo: Si quieres revertir la operación 100, usa 99 como el número.
Tendrás la opción de confirmar."

