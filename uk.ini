MSG_HELP="Usage: solseek


General Options:
 -cc                          : clears all cache
 --debug                      : show debug information for solseek and exit
 --version                    : show program's version number and exit
 -h (--help)                  : show this help message and exit

Enhanced update (up) command
    Default: Updates eopkg and flatpak
    Usage: solseek up <options>

    Options:
     -e    - Updates everything including snap, firmware, distrobox, custom if enabled

Enhanced search (sr) command
    Default: Search eopkg only
    Usage: solseek sr <options> (arguments)

    Options:
     -f    - Search flatpaks only
     -a    - Search flatpaks and eopkg
"

